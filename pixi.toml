[workspace]
authors = ["wenxu yuan <yuanwenxu123@gmail.com>"]
channels = ["conda-forge", "bioconda"]
name = "LongcellLite"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
install-genomeinfodbdata = "pixi run -e long bash ./env/install_genomeinfodbdata.sh"
install-longcellsrc = 'pixi run -e long Rscript -e "devtools::install_github(\"yuan-wenxu/Longcellsrc\")"'
install-longcelllite-local = "pixi run -e long R CMD INSTALL ."
install-longcelllite-stack = { depends-on = ["install-longcellsrc", "install-longcelllite-local"] }

[dependencies]

[feature.long.dependencies]
r = ">=4.4,<4.5"
samtools = ">=1.23.1,<2"
bedtools = ">=2.31.1,<3"
r-argparse = ">=2.3.1,<3"
r-biocmanager = ">=1.30.27,<2"
"r-data.table" = ">=1.17.8,<2"
r-dbscan = ">=1.2.4,<2"
r-dplyr = ">=1.2.1,<2"
r-igraph = ">=2.3.1,<3"
r-matrix = ">=1.7_5,<2"
r-remotes = ">=2.5.0,<3"
"r-r.utils" = ">=2.13.0,<3"
r-stringr = ">=1.6.0,<2"
r-tidyr = ">=1.3.2,<2"
r-valr = ">=0.6.3,<0.7"
bioconductor-bsgenome = ">=1.74.0,<2"
bioconductor-genomeinfodb = ">=1.42.0,<2"
bioconductor-genomeinfodbdata = ">=1.2.13,<2"
bioconductor-genomicfeatures = ">=1.58.0,<2"
bioconductor-genomicranges = ">=1.58.0,<2"
bioconductor-iranges = ">=2.40.0,<3"
bioconductor-rsamtools = ">=2.22.0,<3"
bioconductor-txdbmaker = ">=1.2.0,<2"
bioconductor-biostrings = ">=2.74.0,<3"

[environments]
long = ["long"]
